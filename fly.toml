app = "nq-shoppable-v2"
primary_region = "sin"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

# No volume needed — data now lives in Neon Postgres (set via DATABASE_URL secret).

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    # Storefront endpoints are tiny, fast reads (~10ms), so a single machine can
    # handle far more than the old 25. soft_limit triggers auto-starting a 2nd
    # machine under sustained load; hard_limit is the absolute per-machine cap.
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
