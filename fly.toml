app = "nq-shoppable-v2"
primary_region = "sin"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[mounts]
  source = "nq_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
